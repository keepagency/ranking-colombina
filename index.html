const b2u = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryOpen(pw) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: b2u(SALT), iterations: ITER, hash: "SHA-256" }, km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b2u(IV) }, key, b2u(CT));
  const html = new TextDecoder().decode(pt);
  document.open(); document.write(html); document.close();
}
document.getElementById("f").addEventListener("submit", async e => {
  e.preventDefault();
  const btn = document.getElementById("btn"), pw = document.getElementById("pw").value;
  btn.disabled = true; btn.textContent = "Abriendo…";
  try {
    if (document.getElementById("rem").checked) { try { localStorage.setItem("rk_pw", pw); } catch (x) {} }
    await tryOpen(pw);
  } catch (x) {
    try { localStorage.removeItem("rk_pw"); } catch (y) {}
    btn.disabled = false; btn.textContent = "Entrar";
    document.getElementById("err").style.display = "block";
  }
});
(async () => {
  let saved = null; try { saved = localStorage.getItem("rk_pw"); } catch (x) {}
  if (saved) { try { await tryOpen(saved); } catch (x) { try { localStorage.removeItem("rk_pw"); } catch (y) {} } }
})();
